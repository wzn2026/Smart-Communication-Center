# ─── Nginx Production Reverse Proxy ──────────────────────────────────────────
# Architecture:
#   Internet → Cloudflare (public TLS) → Nginx :443 (Cloudflare Origin Cert)
#
# SSL mode: Full Strict
#   Cloudflare validates our origin cert (Cloudflare Origin CA).
#   Cert files (mounted as a volume):
#     /etc/cloudflare/origin.pem   — certificate chain (from Cloudflare dashboard)
#     /etc/cloudflare/origin.key   — private key      (generated alongside cert)
#
# Routing:
#   app.comm.wasal.sa → frontend container :80
#   api.comm.wasal.sa → backend Daphne     :8000
#     /ws/  — WebSocket upgrade (3600s timeout)
#     /     — HTTP API + static + admin + health
#
# Port 80: redirects to 443 (for any direct hits; Cloudflare normally uses 443)
# ─────────────────────────────────────────────────────────────────────────────

# ── Cloudflare real-IP passthrough ───────────────────────────────────────────
# https://www.cloudflare.com/ips/
# IPv4
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# ── Upstreams ─────────────────────────────────────────────────────────────────

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend_app {
    server frontend:80;
    keepalive 8;
}

# ── X-Forwarded-Proto: always https (Cloudflare Full Strict sends HTTPS) ──────

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

# ── Shared SSL settings ───────────────────────────────────────────────────────

ssl_certificate         /etc/cloudflare/origin.pem;
ssl_certificate_key     /etc/cloudflare/origin.key;

ssl_protocols           TLSv1.2 TLSv1.3;
ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
ssl_prefer_server_ciphers off;
ssl_session_cache       shared:SSL:10m;
ssl_session_timeout     1d;
ssl_session_tickets     off;

# ── Port 80: redirect all traffic to 443 ─────────────────────────────────────

server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── app.comm.wasal.sa → React SPA ────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name app.comm.wasal.sa;

    access_log  /var/log/nginx/app_access.log;
    error_log   /var/log/nginx/app_error.log warn;

    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  https;
        proxy_read_timeout 30s;

        # SPA shell must never be cached
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}

# ── api.comm.wasal.sa → Django/Daphne ────────────────────────────────────────

server {
    listen 443 ssl;
    server_name api.comm.wasal.sa;

    client_max_body_size 20m;
    access_log  /var/log/nginx/api_access.log;
    error_log   /var/log/nginx/api_error.log warn;

    # ── WebSocket /ws/ — must come before catch-all ──────────────────────────
    location /ws/ {
        proxy_pass            http://backend;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade            $http_upgrade;
        proxy_set_header      Connection         "upgrade";
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  https;

        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout   75s;
        proxy_buffering       off;
    }

    # ── REST API + admin + health + static ────────────────────────────────────
    location / {
        proxy_pass            http://backend;
        proxy_http_version    1.1;
        proxy_set_header      Connection         "";
        proxy_set_header      Host               $host;
        proxy_set_header      X-Real-IP          $remote_addr;
        proxy_set_header      X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto  https;
        proxy_read_timeout    60s;
        proxy_connect_timeout 30s;

        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }
}
