# ─── Frontend Nginx — Production ─────────────────────────────────────────────
# Serves the React SPA static build.
# No API proxy here — API is on api.comm.wasal.sa (different domain).
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # SPA routing — all paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Hashed static assets — cache aggressively
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check for container orchestration
    location /nginx-health {
        return 200 'ok';
        add_header Content-Type text/plain;
        access_log off;
    }
}
